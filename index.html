<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RaveLoops – Download the Pack</title>
    <meta
      name="description"
      content="Lots of VJ loops for your rave, party, concert, gig or event needs."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #050510;
        --bg-alt: #0b0b1c;
        --accent: #ff4fd8;
        --accent-soft: rgba(255, 79, 216, 0.2);
        --accent-alt: #4f9bff;
        --text-main: #f8f8ff;
        --text-muted: #9a9ac5;
        --card-bg: rgba(15, 15, 40, 0.9);
        --border-subtle: rgba(255, 255, 255, 0.08);
        --radius-xl: 24px;
        --shadow-soft: 0 24px 60px rgba(0, 0, 0, 0.75);
        --transition-fast: 150ms ease-out;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        font-family: "Space Grotesk", -apple-system, BlinkMacSystemFont,
          system-ui, "Helvetica Neue", Helvetica, Arial, sans-serif;
        color: var(--text-main);
        background:
          radial-gradient(circle at top left, #281463 0, transparent 55%),
          radial-gradient(circle at bottom right, #521266 0, transparent 55%),
          linear-gradient(145deg, var(--bg), #020206);
      }

      body {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      .glow-orbit {
        position: fixed;
        inset: 0;
        pointer-events: none;
        overflow: hidden;
      }

      .glow-orbit::before,
      .glow-orbit::after {
        content: "";
        position: absolute;
        width: 420px;
        height: 420px;
        border-radius: 999px;
        background: radial-gradient(circle, var(--accent) 0, transparent 55%);
        opacity: 0.08;
        filter: blur(8px);
      }

      .glow-orbit::before {
        top: -160px;
        right: 2%;
      }

      .glow-orbit::after {
        bottom: -200px;
        left: -60px;
        background: radial-gradient(circle, var(--accent-alt) 0, transparent 55%);
      }

      .shell {
        position: relative;
        width: 100%;
        max-width: 720px;
        margin: 0 auto;
        z-index: 1;
      }

      #bg-canvas {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        display: block;
        z-index: 0;
        background: radial-gradient(circle at top, #050510, #02010a);
      }

      .card {
        position: relative;
        border-radius: 0;
        padding: 32px 20px;
        background: transparent;
        border: none;
        box-shadow: none;
        display: flex;
        flex-direction: column;
        gap: 18px;
      }

      @media (min-width: 720px) {
        .card {
          padding: 32px 36px 32px;
          grid-template-columns: minmax(0, 1.2fr) minmax(0, 1.1fr);
          align-items: center;
        }
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 4px 10px;
        border-radius: 999px;
        background: rgba(8, 8, 32, 0.8);
        border: 1px solid rgba(255, 255, 255, 0.08);
        color: var(--text-muted);
        font-size: 11px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .badge-dot {
        width: 7px;
        height: 7px;
        border-radius: 999px;
        background: radial-gradient(circle, #58ffb3 0, #1baa64 45%, transparent 100%);
        box-shadow: 0 0 12px rgba(88, 255, 179, 0.8);
      }

      .layout-main {
        display: flex;
        flex-direction: column;
        gap: 18px;
      }

      .logo-lockup {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-top: 2px;
      }

      .logo-mark {
        width: 28px;
        height: 28px;
        border-radius: 9px;
        background:
          conic-gradient(from 220deg, #ff4fd8, #ffaf4f, #4f9bff, #ff4fd8);
        padding: 2px;
      }

      .logo-mark-inner {
        width: 100%;
        height: 100%;
        border-radius: 7px;
        background: radial-gradient(circle at 20% 0, #ffffff, #241132);
        display: flex;
        align-items: center;
        justify-content: center;
        color: #050510;
        font-weight: 800;
        font-size: 14px;
        letter-spacing: 0.08em;
      }

      .logo-text {
        display: flex;
        flex-direction: column;
        gap: 1px;
      }

      .logo-title {
        font-weight: 600;
        font-size: 13px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      .logo-subtitle {
        font-size: 11px;
        color: var(--text-muted);
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .headline {
        font-size: clamp(28px, 4vw, 36px);
        line-height: 1.12;
        letter-spacing: -0.03em;
        margin: 4px 0 0;
      }

      .headline span.gradient {
        background: linear-gradient(130deg, #ff4fd8, #ffaf4f, #4f9bff);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }

      .subcopy {
        margin-top: 10px;
        font-size: 14px;
        line-height: 1.6;
        color: var(--text-muted);
        max-width: 34rem;
      }

      .actions {
        margin-top: 18px;
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 10px 14px;
      }

      .btn-primary {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 9px 18px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.24);
        cursor: pointer;
        font-size: 13px;
        font-weight: 500;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--text-main);
        background: rgba(5, 5, 20, 0.7);
        box-shadow: none;
        transition:
          background var(--transition-fast),
          border-color var(--transition-fast),
          transform var(--transition-fast);
        text-decoration: none;
      }

      .btn-primary:hover {
        background: rgba(15, 15, 40, 0.9);
        border-color: rgba(255, 255, 255, 0.4);
        transform: translateY(-1px);
      }

      .btn-primary:active {
        transform: translateY(0);
        background: rgba(10, 10, 32, 0.9);
      }

      .btn-pill {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 8px 14px;
        border-radius: 999px;
        font-size: 12px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: radial-gradient(circle at 0 0, rgba(255, 126, 248, 0.22), transparent 55%),
          linear-gradient(135deg, rgba(10, 10, 40, 0.95), rgba(10, 10, 32, 0.95));
        color: var(--text-muted);
        text-decoration: none;
      }

      .btn-pill-icon {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 18px;
        height: 18px;
        border-radius: 999px;
        background: radial-gradient(circle at 30% 0, #ffffff, #ff4fd8);
        color: #050510;
        font-size: 11px;
      }

      .meta {
        margin-top: 6px;
        display: flex;
        flex-wrap: wrap;
        gap: 10px 18px;
        font-size: 11px;
        color: var(--text-muted);
      }

      .meta span {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        white-space: nowrap;
      }

      .dot-soft {
        width: 6px;
        height: 6px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.2);
      }

      .preview {
        position: relative;
      }

      .preview-shell {
        border-radius: 20px;
        padding: 10px;
        background: radial-gradient(circle at 0 0, rgba(255, 126, 248, 0.18), transparent 50%),
          radial-gradient(circle at 100% 100%, rgba(79, 155, 255, 0.18), transparent 55%),
          linear-gradient(145deg, rgba(10, 10, 36, 0.96), rgba(5, 5, 22, 0.98));
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow:
          0 18px 50px rgba(0, 0, 0, 0.95),
          inset 0 0 0 1px rgba(255, 255, 255, 0.03);
      }

      .preview-header {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 10px;
      }

      .preview-dots {
        display: inline-flex;
        gap: 4px;
      }

      .preview-dot {
        width: 7px;
        height: 7px;
        border-radius: 999px;
      }

      .preview-dot:nth-child(1) {
        background: #ff5f57;
      }
      .preview-dot:nth-child(2) {
        background: #febc2e;
      }
      .preview-dot:nth-child(3) {
        background: #28c840;
      }

      .preview-url {
        flex: 1;
        border-radius: 999px;
        background: rgba(0, 0, 0, 0.5);
        padding: 5px 10px;
        font-size: 11px;
        color: var(--text-muted);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }

      .preview-tag {
        font-size: 10px;
        padding: 3px 8px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.06);
        color: var(--text-muted);
      }

      .wave-card {
        margin-top: 4px;
        border-radius: 14px;
        padding: 10px 10px 12px;
        background: radial-gradient(circle at 0 0, rgba(255, 126, 248, 0.32), transparent 55%),
          linear-gradient(145deg, rgba(9, 9, 36, 0.98), rgba(10, 10, 46, 0.98));
        border: 1px solid rgba(255, 255, 255, 0.12);
        position: relative;
        overflow: hidden;
      }

      .wave-meta {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 6px;
        margin-bottom: 10px;
        font-size: 11px;
        color: var(--text-muted);
      }

      .wave-title {
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .wave-label {
        border-radius: 999px;
        padding: 3px 10px;
        background: rgba(0, 0, 0, 0.5);
        border: 1px solid rgba(255, 255, 255, 0.12);
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }

      .wave-label-dot {
        width: 6px;
        height: 6px;
        border-radius: 999px;
        background: radial-gradient(circle, #58ffb3 0, #1baa64 45%, transparent 100%);
        box-shadow: 0 0 10px rgba(88, 255, 179, 0.8);
      }

      .waveform {
        display: grid;
        grid-auto-flow: column;
        grid-auto-columns: minmax(2px, 1fr);
        gap: 2px;
        align-items: flex-end;
        height: 72px;
      }

      .bar {
        border-radius: 999px;
        background: linear-gradient(to top, rgba(255, 255, 255, 0.02), rgba(255, 255, 255, 0.32));
        position: relative;
        overflow: hidden;
      }

      .bar::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          to top,
          rgba(255, 255, 255, 0),
          rgba(255, 255, 255, 0.9),
          rgba(255, 255, 255, 0)
        );
        opacity: 0.22;
        transform: translateY(12%);
      }

      .wave-foot {
        margin-top: 8px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        font-size: 10px;
        color: var(--text-muted);
      }

      .pill-small {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 3px 8px;
        border-radius: 999px;
        background: rgba(0, 0, 0, 0.5);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      .pill-indicator {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: radial-gradient(circle, var(--accent) 0, transparent 65%);
      }

      .redirect-note {
        margin-top: 12px;
        font-size: 11px;
        color: var(--text-muted);
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .redirect-note span.timer {
        font-variant-numeric: tabular-nums;
        color: #ffffffc9;
      }

      .chip-soft {
        padding: 3px 9px;
        border-radius: 999px;
        border: 1px dashed rgba(255, 255, 255, 0.12);
        background: rgba(4, 4, 18, 0.9);
        font-size: 10px;
        color: var(--text-muted);
      }

      .card.page {
        align-items: center;
      }

      .page {
        text-align: center;
      }

      .hero {
        display: flex;
        flex-direction: column;
        gap: 8px;
        align-items: center;
        max-width: 30rem;
        margin: 0 auto;
        text-align: center;
      }

      .site-title {
        font-size: clamp(40px, 6vw, 60px);
        letter-spacing: 0.04em;
        font-weight: 600;
        margin: 0;
      }

      .brand-image {
        width: 100%;
        max-width: 30rem;
        height: auto;
        display: block;
        margin: 0;
        object-fit: contain;
        /* White in the PNG × backdrop → shows particles; screen is for black bg art only. */
        mix-blend-mode: multiply;
      }

      .site-tagline {
        margin: 0;
        font-size: 13px;
        line-height: 1.7;
        color: rgba(200, 200, 230, 0.86);
        max-width: 30rem;
        text-align: center;
      }

      .site-tagline + .site-tagline {
        margin-top: 4px;
      }

      .cta-row {
        margin-top: 18px;
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
        justify-content: center;
        width: 100%;
      }

      .small-note {
        margin-top: 10px;
        font-size: 11px;
        color: var(--text-muted);
        text-align: center;
        width: 100%;
      }

      @media (max-width: 719px) {
        body {
          padding: 18px;
        }

        .card {
          padding: 22px 18px 18px;
          gap: 22px;
        }

        .layout-main {
          order: 2;
        }

        .preview {
          order: 1;
        }
      }
    </style>
    <!--
      To wire this up:
      1. Replace GUMROAD_URL below with your real Gumroad product URL.
      2. Commit to GitHub and connect the repo in Vercel.
      3. Configure your custom domain in Vercel to point at this project.
    -->
  </head>
  <body>
    <canvas id="bg-canvas" aria-hidden="true"></canvas>
    <main class="shell">
      <section class="card page" aria-label="RaveLoops landing">
        <header class="hero">
          <img
            class="brand-image"
            src="./assets/raveloops-club.png"
            alt="Rave Loops Club logo"
          />
          <p class="site-tagline">
            Lots of VJ loops for all your rave/party/concert/gig/event needs.
          </p>
          <p class="site-tagline">
            Few free VJ loops, few paid :)
          </p>
        </header>

        <div class="cta-row">
          <a
            id="primary-cta"
            class="btn-primary"
            href="https://combs.gumroad.com/"
            target="_blank"
            rel="noopener noreferrer"
          >
            Go to Gumroad
          </a>
        </div>

        <p class="small-note">
          You’ll be redirected to Gumroad in
          <span id="redirect-timer" class="timer">15</span>s, or use the button.
        </p>
      </section>
    </main>

    <script>
      // Gumroad redirect + subtle shader background
      const GUMROAD_URL = "https://combs.gumroad.com/";

      const primaryCta = document.getElementById("primary-cta");
      if (primaryCta) {
        primaryCta.href = GUMROAD_URL;
      }

      // Simple auto-redirect with visible countdown
      const REDIRECT_SECONDS = 15;
      const timerEl = document.getElementById("redirect-timer");
      if (timerEl) {
        let remaining = REDIRECT_SECONDS;
        const redirectInterval = setInterval(() => {
          remaining -= 1;
          timerEl.textContent = String(Math.max(remaining, 0)).padStart(2, "0");
          if (remaining <= 0) {
            clearInterval(redirectInterval);
            window.location.href = GUMROAD_URL;
          }
        }, 1000);
      }

      // Minimal Canvas sparkly trail (WebGL-free for reliability)
      const canvas = document.getElementById("bg-canvas");
      const ctx = canvas && canvas.getContext("2d");
      if (ctx && canvas) {
        const resize = () => {
          const dpr = window.devicePixelRatio || 1;
          const width = window.innerWidth;
          const height = window.innerHeight;
          canvas.style.width = width + "px";
          canvas.style.height = height + "px";
          canvas.width = width * dpr;
          canvas.height = height * dpr;
        };
        window.addEventListener("resize", resize);
        resize();

        const POINT_COUNT = 120;
        const particles = [];
        for (let i = 0; i < POINT_COUNT; i++) {
          particles.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            vx: (Math.random() - 0.5) * 0.4 * 1.5,
            vy: (Math.random() - 0.5) * 0.4 * 1.5,
            age: Math.random() * 600
          });
        }

        const mouse = { x: canvas.width * 0.5, y: canvas.height * 0.4 };

        const updateMouseFromClient = (clientX, clientY) => {
          const dpr = window.devicePixelRatio || 1;
          mouse.x = clientX * dpr;
          mouse.y = (window.innerHeight - clientY) * dpr;
        };

        window.addEventListener("pointermove", (e) => {
          updateMouseFromClient(e.clientX, e.clientY);
        });

        window.addEventListener(
          "touchmove",
          (e) => {
            if (e.touches && e.touches.length > 0) {
              const t = e.touches[0];
              updateMouseFromClient(t.clientX, t.clientY);
            }
          },
          { passive: true }
        );

        const loop = () => {
          const dpr = window.devicePixelRatio || 1;

          ctx.save();
          ctx.scale(1, 1);

          // subtle trail clear
          ctx.fillStyle = "rgba(3, 3, 15, 0.22)";
          ctx.fillRect(0, 0, canvas.width, canvas.height);

          for (let i = 0; i < POINT_COUNT; i++) {
            const p = particles[i];

            const dx = mouse.x - p.x;
            const dy = mouse.y - p.y;
            const dist = Math.sqrt(dx * dx + dy * dy) + 0.001;

            // stronger attraction toward cursor
            const force = dist < 260 * dpr ? 0.11 * 1.5 : 0.02 * 1.5;
            p.vx += (dx / dist) * force;
            p.vy += (dy / dist) * force;

            // local turbulence around cursor
            if (dist < 180 * dpr) {
              const angle = Math.random() * Math.PI * 2;
              const jitter = 0.07 * 1.5 * (1 - dist / (180 * dpr));
              p.vx += Math.cos(angle) * jitter;
              p.vy += Math.sin(angle) * jitter;

              // slight swirl around cursor
              const swirl = 0.035 * 1.5;
              p.vx += (-dy / dist) * swirl;
              p.vy += (dx / dist) * swirl;
            }

            p.vx *= 0.88;
            p.vy *= 0.88;

            p.x += p.vx;
            p.y += p.vy;

            p.age += 1;

            // wrap or respawn to preserve "star" layout
            const margin = 40 * dpr;
            if (p.x < -margin || p.x > canvas.width + margin || p.y < -margin || p.y > canvas.height + margin || p.age > 600) {
              p.x = Math.random() * canvas.width;
              p.y = Math.random() * canvas.height;
              p.vx = (Math.random() - 0.5) * 0.4 * 1.5;
              p.vy = (Math.random() - 0.5) * 0.4 * 1.5;
              p.age = 0;
            }

            const baseRadius = 1.3 * dpr;
            const distCursor = Math.min(dist / (260 * dpr), 1);
            const r = baseRadius + (1.4 - distCursor * 1.4) * dpr;

            const gradient = ctx.createRadialGradient(
              p.x,
              canvas.height - p.y,
              0,
              p.x,
              canvas.height - p.y,
              r * 4
            );
            gradient.addColorStop(0, "rgba(255, 255, 255, 0.9)");
            gradient.addColorStop(0.3, "rgba(204, 180, 255, 0.7)");
            gradient.addColorStop(1, "rgba(7, 6, 20, 0)");

            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(p.x, canvas.height - p.y, r, 0, Math.PI * 2);
            ctx.fill();
          }

          ctx.restore();
          requestAnimationFrame(loop);
        };

        requestAnimationFrame(loop);
      }
    </script>
  </body>
</html>
